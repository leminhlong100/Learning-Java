site_name: Lộ Trình Java + Tiếng Anh 12 Tuần
site_description: Java + Spring + AI + System Design · 12 tuần · kèm Tiếng Anh mỗi ngày
docs_dir: docs

theme:
  name: material
  language: vi
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Mặc định: nền SÁNG (tươi, dễ học) — có nút chuyển sang tối
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Chuyển sang nền tối
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang nền sáng

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - md_in_html
  - attr_list
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - vi
        - en

nav:
  - Trang chủ: index.md
  - Tuần 1 · OOP + Generics + Collections: weeks/tuan-01.md
  - Tuần 2 · Exception + Collections: weeks/tuan-02.md
  - Tuần 3 · Stream + Concurrency: weeks/tuan-03.md
  - Tuần 4 · Spring Boot + REST API: weeks/tuan-04.md
  - Tuần 5 · JPA + Spring AI Setup: weeks/tuan-05.md
  - Tuần 6 · Spring AI + Chatbot Streaming: weeks/tuan-06.md
  - Tuần 7 · JWT/Security + JUnit + RAG: weeks/tuan-07.md
  - Tuần 8 · Ôn tập Spaced Review: weeks/tuan-08.md
  - Tuần 9 · Microservices + Docker: weeks/tuan-09.md
  - Tuần 10 · JVM + Design Patterns: weeks/tuan-10.md
  - Tuần 11 · LeetCode + System Design: weeks/tuan-11.md
  - Tuần 12 · Tổng ôn + Nộp đơn: weeks/tuan-12.md
